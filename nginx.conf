server {
    listen 80;

    # Disable absolute redirects to prevent Nginx from inserting 'localhost' into redirects
    # when running behind a Cloudflare Tunnel or other reverse proxy.
    absolute_redirect off;

    # The directory where the frontend build files are stored inside the container.
    root /usr/share/nginx/html;

    # Proxy requests for product images.
    # Maps: https://fahmiefendy.dev/the-wine-corner/uploads/images/ -> http://twc-be:5001/uploads/images/
    location /the-wine-corner/uploads/images/ {
        proxy_pass http://twc-be:5001/uploads/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy requests for the API.
    # Maps: https://fahmiefendy.dev/the-wine-corner/api/ -> http://twc-be:5001/api/
    location /the-wine-corner/api/ {
        proxy_pass http://twc-be:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the frontend static files.
    # This block handles React routing by falling back to index.html for any sub-path.
    location /the-wine-corner/ {
        try_files $uri $uri/ /the-wine-corner/index.html;
    }

    # Redirect the root domain (/) to the main application path.
    location = / {
        return 301 /the-wine-corner/;
    }
}
